<div class="tag-input-container">
  <div class="tag-input-wrapper">
    <mat-form-field appearance="outline" class="full-width primary-field">
      <mat-label>{{ placeholder }}</mat-label>
      <input
        matInput
        [(ngModel)]="currentInput"
        (keydown)="onKeyDown($event)"
        [placeholder]="placeholder"
      />
      <button
        mat-button
        color="primary"
        matSuffix
        type="button"
        (click)="addTag()"
        [disabled]="isInputEmpty"
        aria-label="Add search term"
        class="add-button"
      >
        Add
      </button>
    </mat-form-field>
    <div
      *ngIf="tags.length > 0"
      class="tag-list"
      cdkDropList
      cdkDropListOrientation="mixed"
      [cdkDropListData]="tags"
      (cdkDropListDropped)="reorderTag($event)"
    >
      <ng-container *ngFor="let tag of tags">
        <div cdkDrag class="search-tag">
          <lib-color-chip
            [text]="tag"
            color="green"
            [showCloseButton]="true"
            (closeClick)="removeTag(tag)"
          ></lib-color-chip>
        </div>
      </ng-container>
      @if((loadingProgress$ | async); as progress) { @if(progress < 100) {
      <mat-progress-spinner
        class="progress-indicator"
        mode="determinate"
        [value]="progress"
        [diameter]="20"
        [strokeWidth]="2"
      />
      } }
    </div>
  </div>
</div>
