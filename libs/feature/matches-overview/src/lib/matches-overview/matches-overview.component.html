<div class="container">
  <lib-section-header text="Experience by Keywords" />

  <!-- TODO web-worker: handle loading state and display skeleton -->
  <div class="grid">
    @for (matchItem of matchesOverview$ | async; track matchItem.keyword) {
    <span class="search-term">{{ matchItem.keyword }}:</span>

    <div class="match-results">
      @if (matchItem.fullMatchesCount > 0) {
      <lib-color-chip
        [text]="
          matchItem.fullMatchesCount +
          ' project' +
          (matchItem.fullMatchesCount !== 1 ? 's' : '')
        "
        color="green"
      />
      } @if (matchItem.partialMatchesCount > 0) {
      <lib-color-chip
        [text]="
          matchItem.partialMatchesCount +
          ' related project' +
          (matchItem.partialMatchesCount !== 1 ? 's' : '')
        "
        color="yellow"
      />
      } @if (matchItem.fullMatchesCount === 0 && matchItem.partialMatchesCount
      === 0) {
      <lib-color-chip text="no related projects" color="red" />
      }
    </div>
    }
  </div>
</div>
