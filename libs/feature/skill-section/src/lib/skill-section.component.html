<div id="skills" class="container">
  <lib-section-header text="Skills" />

  <div class="grid">
    @if (showSkeletons$ | async) { @for (skeletonRow of skillSkeletonRows; track
    skeletonRow) {
    <span class="skill-category" #categoryRef
      ><ngx-skeleton-loader
        class="skill-skeleton skill-skeleton--label"
        appearance="line"
    /></span>

    <div class="skill-category-content-container" #keywordListRef>
      <ngx-skeleton-loader
        class="skill-category-content skill-skeleton skill-skeleton--chips"
        appearance="line"
      />
    </div>
    } } @else { @for (categoryRow of categoryRow$ | async; track
    categoryRow.category) {
    <span class="skill-category" #categoryRef>{{ categoryRow.category }}:</span>

    <div class="skill-category-content-container" #keywordListRef>
      <lib-color-chip-list
        class="skill-category-content"
        [greenItems]="categoryRow.tagLists.fullMatches"
        [yellowItems]="categoryRow.tagLists.partialMatches"
        [grayItems]="categoryRow.tagLists.nonMatches"
      />
    </div>
    }

    <span class="skill-category print-only and-more">and more...</span>
    <lib-color-chip-list
      class="skill-category-content print-only and-more spacer"
      [grayItems]="['spacer']"
    />
    }
  </div>
</div>
