<div
  class="container"
  [style.--chip-height]="chipHeightCssVar()"
  [style.--rows]="rows()"
>
  <div class="chip-column" [class.collapsed]="!expanded()" #chipColumn>
    @for (item of allItems(); track item.text; let i = $index) {
    <lib-color-chip
      #chipItem
      [text]="item.text"
      [color]="item.color"
      [icon]="item.icon"
      [spacing]="spacing()"
      [class.chip-hidden]="isItemHidden(i)"
    />
    }
  </div>

  @if (showToggleButton()) {
  <button
    #toggleButton
    mat-button
    color="basic"
    class="toggle-button"
    (click)="toggleCollapsed()"
  >
    @if (!printMode()) {
    <mat-icon>{{ expanded() ? 'expand_less' : 'expand_more' }}</mat-icon>
    } @if (!printMode()) {
    <span>{{ expanded() ? 'less' : hiddenItemsCount() + ' more' }}</span>
    } @else {
    <span>+ {{ hiddenItemsCount() }} more</span>
    }
  </button>
  }
</div>
