name: Test Storybook

on:
  workflow_call:
    inputs:
      commit:
        description: 'The commit to checkout'
        required: false
        type: string

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  test-storybook:
    name: Test Storybook
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 🔁 Setup Nx environment
        uses: ./.github/actions/setup-nx

      - name: 🎭 Setup Playwright environment
        uses: ./.github/actions/setup-playwright

      - name: 💾 Cache wait-on for Storybook tests
        id: wait-on-cache
        uses: actions/cache@v4
        with:
          path: .wait-on
          key: ${{ runner.os }}-storybook-wait-on-${{
            hashFiles('.github/workflows/test-storybook.yml') }}
          restore-keys: |
            ${{ runner.os }}-storybook-wait-on-

      - name: 📚 Install wait-on for Storybook tests
        if: steps.wait-on-cache.outputs.cache-hit != 'true'
        run: npm install --no-save --prefix .wait-on wait-on

      - name: 📖 Test Storybook
        run: |
          # Start static Storybook server in background on port 6006
          npx nx static-storybook frontend --configuration=ci --port=6006 &
          STORYBOOK_PID=$!

          # Wait for Storybook to be ready
          .wait-on/node_modules/.bin/wait-on http://localhost:6006 --timeout 300000

          # Run Storybook tests
          npx nx test-storybook frontend --url=http://localhost:6006

          # Stop Storybook server
          kill $STORYBOOK_PID || true
